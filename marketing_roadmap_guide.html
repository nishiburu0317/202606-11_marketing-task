<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- このページは「中身のないリダイレクト用ページ」です。
     昔の共有URL（…/marketing_roadmap_guide.html）を開いた人を、
     新しい index.html へ自動で転送します。 -->

<!-- ① ブラウザ標準の自動転送（0秒後に index.html へ移動） -->

<!-- ② 検索エンジンに「正式なページは index.html だよ」と伝える -->
<link rel="canonical" href="index.html">

<title>移動しました — マーケティング転職ロードマップ</title>
</head>
<body style="font-family: sans-serif; padding: 40px; line-height: 1.8;">
  <!-- ③ 自動転送が効かない場合のための手動リンク -->
  <p>ページが新しい場所へ移動しました。</p>
  <p>自動で移動しない場合は、こちらをタップしてください：<br>
    <a href="index.html">マーケティング転職ロードマップを開く →</a>
  </p>

  <!-- ④ 念のためJavaScriptでも転送（②のmetaが効かない環境向けの保険） -->
  <script>
    location.replace('index.html');
  </script>
</body>
</html>
